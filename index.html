<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Video</title>
  <meta name="description" content="Embedded video page with header logos." />

  <style>
    :root{
      --bg: #0b0c10;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --shadow: 0 18px 48px rgba(0,0,0,0.35);
      --radius: 16px;
      --maxw: 1100px;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 20% 0%, rgba(134,31,65,0.25), transparent 60%),
        radial-gradient(1000px 700px at 85% 10%, rgba(255,255,255,0.10), transparent 55%),
        linear-gradient(180deg, #07080b 0%, var(--bg) 60%, #05060a 100%);
    }

    header{
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(10,11,16,0.55);
      border-bottom: 1px solid var(--border);
    }

    .header-inner{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }

    .brand img{
      height: 44px;
      width: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    }

    .brand .label{
      font-weight: 650;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 38vw;
    }

    main{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 28px 18px 48px;
      display: grid;
      justify-items: center;
    }

    .video-card{
      width: min(100%, 980px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .video-title{
      margin: 0 0 10px;
      font-size: 1.1rem;
      font-weight: 650;
    }

    .video-subtitle{
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    /* Responsive 16:9 embed wrapper */
    .embed{
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.30);
    }

    .embed iframe,
    .embed video{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    footer{
      max-width: var(--maxw);
      margin: 22px auto 0;
      padding: 0 18px 28px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 560px){
      .brand img{ height: 36px; }
      .brand .label{ display: none; } /* keep logos clean on small screens */
      .video-card{ padding: 14px; }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <a class="brand" href="#" aria-label="Virginia Tech">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Virginia_Tech_Hokies_logo.svg/1280px-Virginia_Tech_Hokies_logo.svg.png" alt="Virginia Tech logo" />
      </a>

      <a class="brand" href="#" aria-label="The Aerospace Corporation">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/The_Aerospace_Corporation_logo.svg/1280px-The_Aerospace_Corporation_logo.svg.png" alt="The Aerospace Corporation logo" />
      </a>
    </div>
  </header>

  <main>
    <section class="video-card" aria-label="Embedded video">
      <!-- <h1 class="video-title">Project Video</h1> -->

      <!-- YouTube iframe embed -->
      <div class="embed">
        <iframe
          src="https://www.youtube.com/embed/O9XtK6R1QAk?si=4n1XDXcbyO9edRUc"
          title="Embedded video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>
  </main>
  
  <footer>
    © <span id="year"></span>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
